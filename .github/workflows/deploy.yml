name: Deploy (Contabo)

# Auto-deploys on every push to main, and can be run manually.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/sha). Blank = this commit."
        required: false
        default: ""

# Never run two deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # optional: add approval/protection rules in repo settings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & deploy over SSH (key auth)
        env:
          # SSH **private** key (no passphrase). Public half goes in the
          # server user's authorized_keys. Secrets pass via env (not
          # interpolated into the script) to avoid injection.
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          GIT_REF: ${{ github.event.inputs.ref || github.sha }}
        run: |
          set -euo pipefail
          test -n "${HOST:-}"           || { echo "secret DEPLOY_HOST is not set"; exit 1; }
          test -n "${USER:-}"           || { echo "secret DEPLOY_USER is not set"; exit 1; }
          test -n "${DEPLOY_SSH_KEY:-}" || { echo "secret DEPLOY_SSH_KEY is not set"; exit 1; }

          KEY="$HOME/.ssh/deploy_key"
          install -d -m 700 "$HOME/.ssh"
          # tr -d '\r': a key pasted from Windows often carries CRLF, which
          # makes OpenSSH fail with "error in libcrypto".
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > "$KEY"
          chmod 600 "$KEY"
          grep -q "PRIVATE KEY" "$KEY" || {
            echo "DEPLOY_SSH_KEY is not a private key (no 'PRIVATE KEY' header)."
            echo "Paste the PRIVATE key — the full 'cat qpedia_deploy' output — not the .pub."
            exit 1
          }

          printf '%s' "$PROD_ENV_FILE" > qpedia.env
          test -s qpedia.env || { echo "secret PROD_ENV_FILE is empty"; exit 1; }

          SSH_OPTS="-i $KEY -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=30 -o ServerAliveCountMax=240"

          echo "Copying deploy script + env to $HOST"
          scp $SSH_OPTS deploy/deploy.sh "$USER@$HOST:/tmp/qpedia-deploy.sh"
          scp $SSH_OPTS qpedia.env       "$USER@$HOST:/tmp/qpedia.env"
          rm -f qpedia.env

          echo "Running deploy on $HOST (build happens on the server)"
          ssh $SSH_OPTS "$USER@$HOST" "GIT_REF='$GIT_REF' ENV_SRC=/tmp/qpedia.env bash /tmp/qpedia-deploy.sh"
