# Grafana data source: Prometheus (metrics) — bundled inside grafana/otel-lgtm.
#
# Provisioned into /otel-lgtm/grafana/conf/provisioning/datasources/ via a
# read-only bind mount (see docker-compose.yml). Each backend lives in its own
# file so that if one data source fails its health check, Grafana surfaces the
# error for that source only and keeps the others (Grafana's default per-file
# provisioning behavior). Req 8.1, 8.2.
#
# The metrics/traces/logs backends all run *inside* the same otel-lgtm
# container, so their URLs are container-local (localhost), not the compose
# service name. Prometheus listens on 9090.
#
# NOTE: `$$` escapes a literal `$` so Grafana does not treat `${...}` template
# tokens as environment-variable interpolation during provisioning.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 60s
      # Click an exemplar on a metric to jump to the originating trace in Tempo.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "Trace: $${__value.raw}"
