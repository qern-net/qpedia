# Grafana data source: Tempo (traces) — bundled inside grafana/otel-lgtm.
#
# Provisioned read-only into the container (see docker-compose.yml). Kept in its
# own file so a health-check failure here is surfaced for Tempo alone and does
# not remove the Prometheus/Loki sources. Req 8.1, 8.2.
#
# Tempo runs inside the otel-lgtm container and listens on 3200 (container-local).
#
# Trace -> logs correlation (Req 8.9): `tracesToLogsV2` is the trace-side
# derived link on `trace_id`. When an operator opens a trace, Grafana offers a
# jump to the Loki logs carrying the same trace id (the query filters Loki on
# `trace_id = <trace.traceId>`). `$$` escapes literal `$` so the `${...}` tokens
# are passed through to Grafana rather than expanded as env vars at provision time.
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://localhost:3200
    editable: true
    jsonData:
      # Trace -> logs: navigate from a span to the correlated Loki logs that
      # share the same trace_id.
      tracesToLogsV2:
        customQuery: true
        datasourceUid: loki
        query: '{$${__tags}} | trace_id = "$${__trace.traceId}"'
        tags:
          - key: service.name
            value: service_name
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
