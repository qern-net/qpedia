# Grafana data source: Loki (logs) — bundled inside grafana/otel-lgtm.
#
# Provisioned read-only into the container (see docker-compose.yml). Independent
# file so a Loki health-check failure is surfaced for Loki alone and leaves the
# Prometheus/Tempo sources in place. Req 8.1, 8.2.
#
# Loki runs inside the otel-lgtm container and listens on 3100 (container-local).
#
# The `derivedFields` entry is the logs -> traces complement of Tempo's
# trace -> logs link (Req 8.9): a `trace_id` label on a log line becomes a
# clickable link into the Tempo trace. `$$` escapes literal `$` so Grafana does
# not env-expand the `${...}` template tokens during provisioning.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://localhost:3100
    editable: true
    jsonData:
      derivedFields:
        - name: trace_id
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "Trace: $${__value.raw}"
