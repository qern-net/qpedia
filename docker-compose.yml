services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Frontend Firebase config — inlined into the SPA bundle at build
        # time. Read from the top-level .env. Safe to be empty (login page
        # then shows the "not configured" notice).
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_SSO_PROVIDER_ID: ${VITE_FIREBASE_SSO_PROVIDER_ID:-}
    image: qpedia/app:${QPEDIA_VERSION:-dev}
    env_file: .env
    # Compose owns the container's DB URL explicitly so it always points at
    # the `postgres` service (not whatever host a developer set in .env for
    # local `cargo run`) and shares the single password source with the
    # postgres service below. `environment:` overrides `env_file:`.
    environment:
      QPEDIA_DB_URL: postgres://qpedia_admin:${QPEDIA_DB_PASSWORD:-qpedia-dev}@postgres:5432/qpedia?sslmode=disable
    volumes:
      # Bind mounts to ./data/ so wiki, raw docs, and the DB are visible on
      # the host, survive `docker compose down` (including -v), and can be
      # backed up with a simple rsync or git bundle.
      # The data/ directory is gitignored so these files never end up in the repo.
      - ./data/wiki:/data/wiki
      - ./data/raw:/data/raw
      - ./data/models:/data/models
    # Loopback only. In prod the `caddy` service is the public entry (TLS on
    # 443) and reaches the app over the compose network; locally you hit
    # http://localhost:8080. Docker publishes bypass the host firewall, so a
    # `0.0.0.0:8080` mapping would expose the app even behind `ufw` — bind to
    # 127.0.0.1 instead.
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: qpedia_admin
      POSTGRES_PASSWORD: ${QPEDIA_DB_PASSWORD:-qpedia-dev}
      POSTGRES_DB: qpedia
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Bind to loopback only: the app reaches Postgres over the compose
    # network (service name `postgres`), so the host port is only for local
    # `psql`. On a public server a `0.0.0.0:5432` mapping would expose the DB.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qpedia_admin -d qpedia"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # TLS-terminating reverse proxy. Enabled in production via the `caddy`
  # profile (set `COMPOSE_PROFILES=caddy` in .env); not started for local dev.
  # Caddy auto-provisions a Let's Encrypt cert for $QPEDIA_DOMAIN — this needs
  # an A record for that host pointing at this server and ports 80+443 open.
  caddy:
    image: caddy:2-alpine
    profiles: [caddy]
    environment:
      QPEDIA_DOMAIN: ${QPEDIA_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data     # ACME certs/keys — MUST persist (LE rate limits)
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

  marker:
    build:
      context: ./sidecar/marker
    image: qpedia/marker:${QPEDIA_VERSION:-dev}
    profiles: [marker]
    ports:
      - "18081:8000"
    volumes:
      - marker-cache:/root/.cache
    restart: unless-stopped

volumes:
  # Postgres (canonical store), Caddy certs, and the marker model cache use
  # named volumes — everything else is a bind mount to ./data/ above.
  postgres-data:
  caddy-data:
  caddy-config:
  marker-cache:
