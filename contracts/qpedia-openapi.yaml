openapi: 3.1.0
info:
  title: Qpedia Platform API
  version: 1.0.0
  description: |
    HTTP contract for the **Qpedia** knowledge-base engine (`qpedia-api`, Rust/axum),
    consumed by external applications on the Qpedia platform. Originally authored by the
    **first external consumer** (the Qpedia RFP Assembly Platform) and now **upstreamed
    here as the canonical, versioned integration contract** — qpedia is the foundational
    knowledge layer, and this file is the sanctioned `/api/v1` boundary every external AI
    application builds against. Downstream consumers (qpedia-rfp, qcodia, …) track this
    copy; open a PR here when handlers change.

    Scope: the `/api/v1` surface an external app needs to (1) ingest documents,
    (2) run hybrid search, and (3) chat (RAG) over the resulting wiki. Internal admin,
    workspace-management, and connector-OAuth routes exist on the server but are out of
    scope for this external contract.

    Derived from the engine source (handlers in `crates/qpedia-api/src/routes.rs`,
    types in `qpedia-core`/`qpedia-retriever`). Treat the source as the source of truth;
    open a PR against this file when handlers change.

    Integrating a new application? See `INTEGRATION.md` for the two integration
    modes (in-process overlay vs external app), auth/scopes, SDK generation, and
    the full API ceremony.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://qpedia.cloud
    description: Qpedia Cloud (hosted instance this app connects to)
  - url: http://localhost:8080
    description: Local engine (default bind QPEDIA_BIND=0.0.0.0:8080)

security:
  - sessionCookie: []     # current working auth
  - bearerAuth: []        # M2M — accepted only when the deployment overlay registers an ExternalAuthProvider; the bare engine has no built-in scheme

tags:
  - name: Health
  - name: Sources
    description: Document ingestion. Upload → extract → classify → distil → embed → wiki.
  - name: Wiki
    description: Hybrid search and read access over the LLM-authored wiki.
  - name: Chat
    description: Streaming RAG chat over the wiki (Server-Sent Events).
  - name: Auth

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Liveness/readiness probe
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, examples: ["ok"] }

  /api/v1/version:
    get:
      tags: [Health]
      summary: Engine version
      security: []
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated principal (tenant + groups)
      responses:
        '200':
          description: Identity resolved from the bearer token (or dev:admin in dev mode)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sources:
    get:
      tags: [Sources]
      summary: List sources in a folder
      parameters:
        - name: folder
          in: query
          schema: { type: string, default: "/" }
          description: Folder path to list. Defaults to the tenant root.
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        '200':
          description: Sources visible to the caller (ACL-filtered)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Source' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Sources]
      summary: Upload and ingest a document
      description: |
        Multipart upload. The document is hashed, stored, and an ingest job is enqueued;
        the returned `Source` starts in status `pending` and progresses asynchronously
        through the pipeline to `done`. Poll `GET /sources/{id}` or list to observe status.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The document (PDF, DOCX, HTML, etc.)
                folder_path:
                  type: string
                  default: "/"
                  description: Destination folder; ACL is inherited from it.
      responses:
        '200':
          description: Source created and ingest enqueued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Source' }
        '400':
          description: Missing 'file' field or filename
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sources/{id}:
    get:
      tags: [Sources]
      summary: Get a single source by id (slug)
      parameters:
        - $ref: '#/components/parameters/SourceId'
      responses:
        '200':
          description: The source
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Source' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sources/{id}/original:
    get:
      tags: [Sources]
      summary: Download the original uploaded bytes
      parameters:
        - $ref: '#/components/parameters/SourceId'
      responses:
        '200':
          description: Original document bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/wiki/search:
    get:
      tags: [Wiki]
      summary: Hybrid (vector + full-text) search over the wiki
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        '200':
          description: Ranked, ACL-filtered hits
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WikiSearchResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/wiki/list:
    get:
      tags: [Wiki]
      summary: List wiki pages under a path prefix
      parameters:
        - name: prefix
          in: query
          schema: { type: string, default: "" }
      responses:
        '200':
          description: Page list
          content:
            application/json:
              schema:
                type: object
                properties:
                  prefix: { type: string }
                  pages:
                    type: array
                    items: { type: string }

  /api/v1/wiki/pages/{path}:
    get:
      tags: [Wiki]
      summary: Read a wiki page's markdown
      parameters:
        - name: path
          in: path
          required: true
          schema: { type: string }
          description: Page path, e.g. `concepts/quarterly-revenue.md` (may contain slashes).
      responses:
        '200':
          description: Markdown content
          content:
            text/markdown:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/chat:
    post:
      tags: [Chat]
      summary: RAG chat over the wiki (Server-Sent Events stream)
      description: |
        Returns a `text/event-stream`. Events, in order:
        - `meta` — `{ "type": "meta", "retrieved": [{path,title}], "mode": "..." }`
        - `token` (repeated) — `{ "type": "token", "text": "..." }`
        - `done` — terminal success (empty data)
        - `error` — `{ "type": "error", "message": "..." }`

        Rate-limited per tenant (default 30 rpm, burst 10). Requires an LLM provider
        configured on the engine, else `400`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200':
          description: SSE stream of chat events
          content:
            text/event-stream:
              schema:
                type: string
                description: Concatenated SSE frames; see operation description for event payloads.
        '400':
          description: No LLM provider configured / bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429':
          description: Per-tenant chat rate limit exceeded
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds to wait before retrying.

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: qpedia_session
      description: |
        **The only auth the engine accepts today.** Opaque session token (sha256-hashed
        at rest), minted by a Firebase/OIDC login. The `User` extractor reads it from the
        `qpedia_session` cookie; OIDC and Firebase differ only in how the session is minted.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Machine-to-machine path so external apps need not carry a session cookie.
        The engine defines an `ExternalAuthProvider` extension point
        (`AppBuilder::with_auth_provider`) but ships no concrete scheme itself —
        the deployment overlay supplies one. On the qpedia.cloud-hosted instance
        this is a service-token path and an OAuth 2 client-credentials JWT
        verifier (validated against the shared OIDC issuer's JWKS), both
        carrying tenant + groups so RLS scoping is identical to a user session.
        Per-route scope enforcement (distinct `sources.write` / `search.read`
        / `chat` scopes) is still in progress. In the engine's `dev` auth mode
        every request is `dev:admin` and auth may be omitted.

  parameters:
    SourceId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Source id / slug (stable, derived from filename on upload).

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found or not visible to the caller
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    SourceStatus:
      type: string
      description: Ingest pipeline stage.
      enum:
        - pending
        - extracting
        - extracted
        - classifying
        - classified
        - agent_distilling
        - agent_distilled
        - validating
        - validated
        - committing
        - committed
        - embedding
        - done
        - tainted
        - failed
        - dead

    Source:
      type: object
      description: A raw uploaded document. Immutable once ingested.
      required: [id, folder_path, filename, mime, sha256, size_bytes, status, created_at]
      properties:
        id: { type: string, description: Slug id. }
        tenant: { type: string }
        folder_path: { type: string }
        filename: { type: string }
        mime: { type: string }
        sha256: { type: string }
        size_bytes: { type: integer, format: int64 }
        acl:
          type: array
          items: { type: string }
          description: Group names permitted to read this source.
        status: { $ref: '#/components/schemas/SourceStatus' }
        language:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
        ingested_at:
          type: [string, "null"]
          format: date-time
        classification:
          type: [object, "null"]
          additionalProperties: true
          description: Classifier output (doc_type, language, sensitivity, hints, ...).

    WikiSearchResponse:
      type: object
      required: [query, mode, hits]
      properties:
        query: { type: string }
        mode: { type: string, description: "Search mode actually used (e.g. hybrid, filesystem)." }
        hits:
          type: array
          items: { $ref: '#/components/schemas/WikiSearchHit' }

    WikiSearchHit:
      type: object
      required: [path, title, snippet, score]
      properties:
        path: { type: string }
        title: { type: string }
        snippet: { type: string }
        score: { type: number, format: float }

    ChatRole:
      type: string
      enum: [user, assistant]

    ChatTurn:
      type: object
      required: [role, content]
      properties:
        role: { $ref: '#/components/schemas/ChatRole' }
        content: { type: string }

    ChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string }
        history:
          type: array
          default: []
          items: { $ref: '#/components/schemas/ChatTurn' }
        max_pages:
          type: integer
          default: 5
          description: Max wiki pages to retrieve as context.

    Citation:
      type: object
      required: [path, title]
      properties:
        path: { type: string }
        title: { type: string }
